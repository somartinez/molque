<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Molque</title>
  <style>
    .sparkle {
      position: fixed;
      pointer-events: none;
      width: 12px;
      height: 12px;
      background: radial-gradient(circle, #fff 20%, #ffd700 50%, transparent 70%);
      border-radius: 50%;
      animation: sparkle-fade 0.8s ease-out forwards;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 8px #ffd700, 0 0 16px rgba(255, 215, 0, 0.5);
    }
    .sparkle::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 4px;
      height: 4px;
      background: #fff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 6px #fff;
    }
    @keyframes sparkle-fade {
      0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
    }
  </style>
</head>
<body style="font-family: Arial, sans-serif; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;">
  <h1>Molque</h1>
  <p>Branding & Digital Design Studio</p>
  <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ&list=RDdQw4w9WgXcQ&start_radio=1" target="_blank" rel="noopener noreferrer" style="margin-top: 20px; padding: 16px 32px; font-size: 18px; background: #000; color: #fff; text-decoration: none; border-radius: 8px; cursor: pointer;">Presiona aquí</a>

  <script>
    let lastSparkle = 0;
    document.addEventListener('mousemove', (e) => {
      const now = Date.now();
      if (now - lastSparkle < 50) return;
      lastSparkle = now;

      const sparkle = document.createElement('div');
      sparkle.className = 'sparkle';
      sparkle.style.left = e.clientX + 'px';
      sparkle.style.top = e.clientY + 'px';
      document.body.appendChild(sparkle);

      setTimeout(() => sparkle.remove(), 800);
    });
  </script>
</body>
</html>
